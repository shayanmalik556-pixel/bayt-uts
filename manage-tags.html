<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <title>Manage tags - bayt.com</title>
  <script>window.location.replace('tags-dashboard.html');</script>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="manage-tags.css">
  <link rel="stylesheet" href="find-jobs.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="page-manage-tags">
  <header class="header">
    <div class="header-inner">
      <a href="employer.html" class="view-switcher view-switcher-seeker" title="Switch to employer view">For Employers</a>
      <a href="index.html" class="logo">
        <img src="assets/bayt-logo.png?v=2" alt="bayt.com" class="logo-img" />
      </a>
      <label for="nav-toggle" class="hamburger-btn" aria-label="Open menu"><i class="fas fa-bars"></i></label>
      <input type="checkbox" id="nav-toggle" class="nav-toggle">
      <div class="nav-drawer" id="nav-drawer">
        <nav class="nav">
          <a href="#">Dashboard</a>
          <a href="find-jobs.html">Find Jobs <i class="fas fa-chevron-down"></i></a>
          <a href="index.html">My jobs</a>
          <a href="#" class="active">My Profile <i class="fas fa-chevron-down"></i></a>
          <a href="#">Resources <i class="fas fa-chevron-down"></i></a>
          <a href="#">Premium</a>
        </nav>
      </div>
      <div class="header-actions">
        <button class="icon-btn" aria-label="Messages"><i class="far fa-comment-dots"></i></button>
        <button class="icon-btn" aria-label="Notifications"><i class="far fa-bell"></i></button>
        <button class="icon-btn" aria-label="Profile"><i class="far fa-user"></i></button>
        <button class="icon-btn" aria-label="Apps"><i class="fas fa-th"></i></button>
      </div>
    </div>
  </header>

  <main class="manage-tags-main">
    <aside class="manage-tags-sidebar">
      <div class="sidebar-card">
        <h2 class="sidebar-title">Manage Tags</h2>
        <nav class="sidebar-nav">
          <a href="tags-dashboard.html" class="sidebar-item">Dashboard</a>
          <a href="edit-tags.html" class="sidebar-item">Categories &amp; Tags</a>
        </nav>
      </div>
    </aside>

    <div class="manage-tags-content">
      <div class="content-card filters-page-card">
        <h2 class="content-card-title">Filter By Tags</h2>
        <p class="content-card-desc">Search and filter your tagged job listings.</p>
        <div class="search-bar">
          <i class="fas fa-search"></i>
          <input type="text" id="filter-jobs-search" class="search-input" placeholder="Job title, keywords, or company" />
        </div>
        <div class="filters-section">
          <div class="filters-row" id="manage-filters-row"></div>
          <div class="active-filters" id="manage-active-filters" hidden>
            <span class="active-filters-label">Active filters:</span>
            <div class="filter-chips" id="manage-filter-chips"></div>
            <button type="button" class="btn-clear-filters" id="manage-clear-filters">Clear all</button>
          </div>
        </div>
        <div class="jobs-list" id="filter-jobs-list"></div>
      </div>
    </div>
  </main>

  <!-- Add tag modal (for adding tags to jobs in this list) -->
  <div class="tag-modal-overlay" id="manage-tag-modal-overlay" aria-hidden="true" style="display: none;">
    <div class="tag-modal" id="manage-tag-modal" role="dialog" aria-labelledby="manage-tag-modal-title">
      <div class="tag-modal-header">
        <h2 id="manage-tag-modal-title">Add tag to listing</h2>
        <button type="button" class="tag-modal-close" id="manage-tag-modal-close" aria-label="Close">&times;</button>
      </div>
      <div class="tag-modal-body">
        <div class="tag-modal-view tag-modal-categories" id="manage-tag-modal-categories">
          <h3 class="tag-modal-select-label">Select Category</h3>
          <ul class="tag-category-list" id="manage-tag-category-list"></ul>
        </div>
        <div class="tag-modal-view tag-modal-tags" id="manage-tag-modal-tags" hidden>
          <button type="button" class="tag-modal-back" id="manage-tag-modal-back"><i class="fas fa-arrow-left"></i> Back</button>
          <h3 class="tag-modal-subtitle" id="manage-tag-modal-subtitle"></h3>
          <ul class="tag-option-list" id="manage-tag-option-list"></ul>
        </div>
      </div>
    </div>
  </div>

  <script src="find-jobs-data.js"></script>
  <script src="manage-tags.js"></script>
  <script src="mobile-nav.js"></script>
</body>
</html>
